<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Rotaract Renaissance Lumina</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signin-container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .signin-container h1 {
            color: #D91E5B;
            margin-bottom: 10px;
            font-size: 2rem;
            text-align: center;
        }

        .signin-container p {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d3436;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #D91E5B;
            box-shadow: 0 0 0 3px rgba(217, 30, 91, 0.1);
        }

        .signin-btn {
            width: 100%;
            padding: 12px;
            background: #D91E5B;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .signin-btn:hover {
            background: #b91650;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(217, 30, 91, 0.3);
        }

        .signin-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #D91E5B;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #28a745;
        }

        .forgot-password {
            text-align: center;
            margin-top: 15px;
        }

        .forgot-password a {
            color: #D91E5B;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .signup-link a {
            color: #D91E5B;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .signin-container {
                padding: 30px;
                margin: 20px;
            }

            .signin-container h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="signin-container">
        <h1>🔑 Sign In</h1>
        <p>Welcome back to Renaissance Lumina</p>

        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>

        <form id="signinForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="signin-btn" id="signinBtn">Sign In</button>
        </form>

        <div class="forgot-password">
            <a href="forgot-password.html">Forgot your password?</a>
        </div>

        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <script>
        const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8000' : '';

        document.getElementById('signinForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const signinBtn = document.getElementById('signinBtn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            signinBtn.disabled = true;
            signinBtn.textContent = 'Signing in...';

            try {
                const response = await fetch(`${API_BASE}/api/signin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('luminaUser', JSON.stringify(data.user));
                    
                    successMsg.textContent = 'Welcome! Redirecting...';
                    successMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    errorMsg.textContent = data.error || 'Sign in failed. Please try again.';
                    errorMsg.style.display = 'block';
                    signinBtn.disabled = false;
                    signinBtn.textContent = 'Sign In';
                }
            } catch (error) {
                console.error('Error:', error);
                errorMsg.textContent = 'Connection error. Make sure the backend is running on port 8000.';
                errorMsg.style.display = 'block';
                signinBtn.disabled = false;
                signinBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
