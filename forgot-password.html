<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Rotaract Lumina</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --main-pink: #D91E5B;
            --light-pink: #FFF0F5;
            --pure-white: #ffffff;
            --soft-gray: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--light-pink) 0%, #ffe4ec 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .recovery-container {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(217, 30, 91, 0.1);
            border: 1px solid #fce4ec;
            padding: 50px 45px;
        }

        .recovery-form h2 {
            color: var(--main-pink);
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 800;
            text-align: center;
        }

        .recovery-form p {
            color: #777;
            margin-bottom: 30px;
            font-size: 0.95rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--main-pink);
            opacity: 0.6;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1.5px solid #eee;
            border-radius: 15px;
            outline: none;
            background: var(--soft-gray);
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--main-pink);
            background: white;
            box-shadow: 0 0 10px rgba(217, 30, 91, 0.05);
        }

        .action-btn {
            background: var(--main-pink);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-btn:hover {
            background: #b5154a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(217, 30, 91, 0.2);
        }

        .action-btn:disabled {
            opacity: 0.7;
            cursor: wait;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
        }

        .back-link a {
            color: #888;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: var(--main-pink);
        }

        .step { display: none; }
        .step.active { display: block; }

        .verification-info {
            background: #fdf2f6;
            padding: 15px;
            border-radius: 10px;
            color: var(--main-pink);
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid #fce4ec;
        }
    </style>
</head>
<body>

    <div class="recovery-container">
        <div class="recovery-form">
            <h2>Reset Access</h2>
            
            <!-- Step 1: Enter Phone -->
            <div id="step1" class="step active">
                <p>Enter the phone number associated with your account to receive a code.</p>
                <div class="input-group">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" placeholder="Phone Number" required>
                </div>
                <button onclick="sendCode()" class="action-btn" id="sendBtn">Send Code</button>
            </div>

            <!-- Step 2: Enter Code -->
            <div id="step2" class="step">
                <p>We've sent a code to your phone. Please enter it below.</p>
                <div class="verification-info">
                    <i class="fas fa-info-circle"></i> A verification code has been sent to your phone number.
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="text" id="code" placeholder="6-Digit Code" maxlength="6" required>
                </div>
                <button onclick="verifyCode()" class="action-btn" id="verifyBtn">Verify Code</button>
            </div>

            <!-- Step 3: New Password -->
            <div id="step3" class="step">
                <p>Choose a strong new password for your account.</p>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="newPassword" placeholder="New Password" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                </div>
                <button onclick="resetPassword()" class="action-btn" id="resetBtn">Update Password</button>
            </div>

            <div class="back-link">
                <a href="signin.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : '';
        let userPhone = '';
        let recoveryCode = '';

        async function apiPost(path, data) {
            const response = await fetch(`${API_BASE}${path}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json().catch(() => ({}));
            if (!response.ok) throw new Error(result.error || 'Something went wrong');
            return result;
        }

        function showStep(stepNum) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${stepNum}`).classList.add('active');
        }

        async function sendCode() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) return alert('Please enter your phone number');

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                await apiPost('/api/forgot-password/send-code', { phone });
                userPhone = phone;
                showStep(2);
            } catch (error) {
                alert(error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Code';
            }
        }

        async function verifyCode() {
            const code = document.getElementById('code').value.trim();
            if (!code) return alert('Please enter the verification code');

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                await apiPost('/api/forgot-password/verify-code', { phone: userPhone, code });
                recoveryCode = code;
                showStep(3);
            } catch (error) {
                alert(error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify Code';
            }
        }

        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 8) return alert('Password must be at least 8 characters');
            if (newPassword !== confirmPassword) return alert('Passwords do not match');

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = 'Updating...';

            try {
                await apiPost('/api/forgot-password/reset', { 
                    phone: userPhone, 
                    code: recoveryCode, 
                    newPassword 
                });
                alert('Password reset successful! You can now log in.');
                window.location.href = 'signin.html';
            } catch (error) {
                alert(error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }
    </script>
</body>
</html>
